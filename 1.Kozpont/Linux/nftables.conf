#!/usr/sbin/nft -f
#/etc/nftables.conf
flush ruleset

# Define your specific trusted subnets
define TRUSTED_NETWORKS = { 
    10.0.0.0/25, 
    10.0.0.128/26, 
    10.0.0.192/27, 
    10.0.0.224/28, 
    10.0.0.240/29, 
    10.0.0.248/29, 
    172.16.0.0/29 
}

table inet filter {
    # TFTP Tracking: Required for the data port negotiation
    ct helper tftp-helper {
        type "tftp" protocol udp
    }

    chain input {
        type filter hook input priority 0; policy drop;

        # 1. Allow established/related (Allows return traffic for your SSH Client and Web Server)
        ct state established,related accept
        
        # 2. Drop invalid packets
        ct state invalid drop

        # 3. Allow Loopback
        iifname "lo" accept

        # 4. PUBLIC: HTML (HTTP/HTTPS) from anywhere
        tcp dport { 80, 443 } accept

        # 5. RESTRICTED: SSH from Trusted Networks only
        ip saddr $TRUSTED_NETWORKS tcp dport 22 accept

        # 6. RESTRICTED: TFTP from Trusted Networks only
        # (Uses the helper defined above for the dynamic data ports)
        ip saddr $TRUSTED_NETWORKS udp dport 69 ct helper set "tftp-helper" accept

        # 7. DHCP SERVER: 
        # Must allow 0.0.0.0 source because new clients don't have an IP yet.
        # We restrict this to the server's physical subnet or interface for security.
        udp dport 67 accept

        # 8. ICMP: Allow Ping from Trusted Networks
        ip saddr $TRUSTED_NETWORKS icmp type echo-request accept

        # 9. DNS: Allow DNS queries from Trusted Networks
        ip saddr $TRUSTED_NETWORKS udp dport 53 accept
        ip saddr $TRUSTED_NETWORKS tcp dport 53 accept
    }

    chain forward {
        type filter hook forward priority 0; policy drop;
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}